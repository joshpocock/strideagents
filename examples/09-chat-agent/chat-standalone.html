<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Agent - Starter Kit</title>
  <style>
    /* Reset and base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #BA9926;
    }

    .header .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    /* User messages: right side, gold background */
    .message.user {
      align-self: flex-end;
      background: #BA9926;
      color: #000;
      border-bottom-right-radius: 4px;
    }

    /* Agent messages: left side, dark gray background */
    .message.agent {
      align-self: flex-start;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
    }

    /* Thinking indicator */
    .message.thinking {
      align-self: flex-start;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #2a2a2a;
      border-bottom-left-radius: 4px;
      font-style: italic;
    }

    /* Error messages */
    .message.error {
      align-self: center;
      background: #2a1010;
      color: #ff6b6b;
      border: 1px solid #4a2020;
      font-size: 13px;
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      gap: 12px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #141414;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #BA9926;
    }

    .input-area input::placeholder {
      color: #555;
    }

    .input-area button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #BA9926;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-area button:hover {
      opacity: 0.85;
    }

    .input-area button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .message {
        max-width: 85%;
      }
      .input-area {
        padding: 12px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Chat Agent</h1>
    <span class="badge">claude-sonnet-4-6</span>
    <span class="badge">Python / Flask</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input
      type="text"
      id="input"
      placeholder="Type a message..."
      autocomplete="off"
    />
    <button id="send" onclick="sendMessage()">Send</button>
  </div>

  <script>
    // --- Chat ID persistence ---
    // Generate a random chat ID on first visit and store in localStorage
    // so the conversation persists across page refreshes.

    function getChatId() {
      var id = localStorage.getItem("chat_id");
      if (!id) {
        id = "chat-" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        localStorage.setItem("chat_id", id);
      }
      return id;
    }

    var chatId = getChatId();
    var messagesEl = document.getElementById("messages");
    var inputEl = document.getElementById("input");
    var sendBtn = document.getElementById("send");
    var isWaiting = false;

    // --- Add a message bubble ---

    function addMessage(text, role) {
      var div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // --- Send a message ---

    async function sendMessage() {
      var text = inputEl.value.trim();
      if (!text || isWaiting) return;

      addMessage(text, "user");
      inputEl.value = "";

      isWaiting = true;
      sendBtn.disabled = true;
      inputEl.disabled = true;

      // Show thinking indicator
      var thinkingDiv = addMessage("Thinking...", "thinking");

      try {
        var res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: chatId, message: text }),
        });

        var data = await res.json();
        thinkingDiv.remove();

        if (res.ok) {
          addMessage(data.response, "agent");
        } else {
          addMessage("Error: " + (data.error || "Unknown error"), "error");
        }
      } catch (err) {
        thinkingDiv.remove();
        addMessage("Error: Could not reach the server. Is it running?", "error");
      }

      isWaiting = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }

    // Send on Enter key
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.focus();
  </script>
</body>
</html>
